name: CI

on:
  push:
  pull_request:

jobs:
  r-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Check that R sources parse
        run: |
          Rscript -e 'ok<-TRUE; for(f in list.files(".",pattern="[.]R$",recursive=TRUE,full.names=TRUE)){r<-tryCatch({parse(file=f);"OK"},error=function(e){message("PARSE ERROR ",f,": ",conditionMessage(e));"FAIL"});cat(r,f,"\n");if(identical(r,"FAIL"))ok<-FALSE}; if(!ok)quit(status=1)'
